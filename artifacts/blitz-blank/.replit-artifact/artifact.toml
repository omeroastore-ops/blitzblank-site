kind = "web"
previewPath = "/"
title = "Blitz Blank Glas- & Gebäudereinigung"
version = "1.0.0"
id = "artifacts/blitz-blank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19784

[services.development]
run = "pnpm --filter @workspace/blitz-blank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blitz-blank", "run", "build" ]
publicDir = "artifacts/blitz-blank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19784"
BASE_PATH = "/"
